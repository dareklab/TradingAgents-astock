services:
  web:
    build: .
    image: tradingagents-astock:latest
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - .:/home/appuser/app
      - ~/.tradingagents:/home/appuser/.tradingagents
    environment:
      TZ: Asia/Shanghai
    entrypoint: [ "streamlit", "run", "/home/appuser/app/web/app.py" ]
    command: [ ]
    tty: true
    stdin_open: true
