services:
  tradingagents:
    build: .
    image: tradingagents-astock:latest
    env_file:
      - .env
    volumes:
      - ~/.tradingagents:/home/appuser/.tradingagents
    profiles:
      - cli
    tty: true
    stdin_open: true

  web:
    build: .
    image: tradingagents-astock:latest
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - .:/home/appuser/app
      - ~/.tradingagents:/home/appuser/.tradingagents
    entrypoint: [ "tradingagents-web" ]
    command: [ ]
    tty: true
    stdin_open: true

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
    volumes:
      - ~/.tradingagents:/home/appuser/.tradingagents
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  ollama_data:
